<!DOCTYPE html>
<html lang="en">
<head>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9f9f7;
      color: #1a1a1a;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    .wrap { max-width: 1400px; margin: 0 auto; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 1.5rem; flex-wrap: wrap; gap: 12px;
    }
    .top-bar h1 { font-size: 20px; font-weight: 700; color: #1a1a1a; }

    .date-picker-wrap {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid #e0dfd8;
      border-radius: 6px; padding: 5px 12px;
    }
    .date-picker-wrap label { font-size: 12px; color: #666; white-space: nowrap; }
    .date-picker-wrap input[type="date"] {
      font-size: 12px; border: none; background: transparent;
      color: #1a1a1a; outline: none; cursor: pointer; font-family: inherit;
    }
    .date-picker-wrap input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }

    .add-btn {
      font-size: 13px; padding: 7px 16px; border-radius: 6px;
      border: 1px solid #d0cfc8; background: #fff; color: #1a1a1a;
      cursor: pointer; display: flex; align-items: center; gap: 6px; font-weight: 500;
    }
    .add-btn:hover { background: #f3f3f0; }

    .metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
      gap: 10px; margin-bottom: 1.5rem;
    }
    .metric { background: #fff; border-radius: 8px; padding: 0.75rem 1rem; border: 1px solid #e8e7e0; }
    .metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .metric-val   { font-size: 22px; font-weight: 600; color: #1a1a1a; }

    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1.25rem; }
    .filter-btn {
      font-size: 12px; padding: 5px 13px; border-radius: 20px;
      border: 1px solid #d0cfc8; background: transparent; color: #666; cursor: pointer;
    }
    .filter-btn:hover { background: #f3f3f0; }
    .filter-btn.active { background: #e8f0fe; color: #1a56db; border-color: #a4c0fb; }

    .rep-section { margin-bottom: 1.75rem; }
    .rep-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 0.75rem; flex-wrap: wrap; gap: 8px;
    }
    .rep-info { display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: #e8f0fe; display: flex; align-items: center;
      justify-content: center; font-weight: 600; font-size: 13px; color: #1a56db; flex-shrink: 0;
    }
    .rep-name  { font-size: 15px; font-weight: 600; color: #1a1a1a; }
    .rep-count { font-size: 12px; color: #888; }
    .email-rep-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 6px;
      border: 1px solid #a4c0fb; background: #e8f0fe; color: #1a56db;
      cursor: pointer; display: flex; align-items: center; gap: 5px; font-weight: 500;
    }
    .email-rep-btn:hover { opacity: 0.85; }

    .table-wrap {
      border: 1px solid #e8e7e0; border-radius: 8px;
      overflow: hidden; background: #fff; overflow-x: auto;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 1020px; }
    th {
      background: #f5f5f2; padding: 10px 12px; text-align: left;
      font-weight: 500; font-size: 12px; color: #666;
      border-bottom: 1px solid #e8e7e0; white-space: nowrap;
    }
    td { padding: 8px 12px; border-bottom: 1px solid #e8e7e0; color: #1a1a1a; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #fafaf8; }
    tr.launched td { opacity: 0.5; }
    tr.launched td:nth-child(2) { text-decoration: line-through; color: #888; }

    .col-launch  { width: 44px; }
    .col-account { width: 16%; }
    .col-reason  { width: 13%; }
    .col-due     { width: 11%; }
    .col-mgr     { width: 17%; }
    .col-agent   { width: 17%; }
    .col-called  { width: 76px; text-align: center; }
    .col-actions { width: 80px; }

    .badge {
      display: inline-block; font-size: 11px; padding: 3px 9px;
      border-radius: 20px; font-weight: 500; white-space: nowrap;
    }
    .badge-domain      { background:#dbeafe; color:#1e40af; }
    .badge-edits       { background:#ede9fe; color:#4c1d95; }
    .badge-unresponsive{ background:#fef3c7; color:#78350f; }
    .badge-approval    { background:#f3f4f6; color:#374151; }
    .badge-launching   { background:#dcfce7; color:#14532d; }
    .badge-other       { background:#f3f4f6; color:#374151; }
    .badge-launched    { background:#dcfce7; color:#14532d; }

    .overdue { color: #b91c1c !important; font-weight: 600; }
    .soon    { color: #b45309 !important; }

    /* Inline editable fields */
    .inline-select, .inline-date {
      font-size: 12px; border: 1px solid transparent; border-radius: 4px;
      background: transparent; color: #1a1a1a; cursor: pointer;
      padding: 3px 6px; font-family: inherit; width: 100%;
      transition: border-color 0.15s, background 0.15s;
    }
    .inline-select:hover, .inline-date:hover {
      border-color: #d0cfc8; background: #fafaf8;
    }
    .inline-select:focus, .inline-date:focus {
      border-color: #a4c0fb; background: #fff; outline: none;
    }
    .inline-date::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

    .action-btn {
      font-size: 12px; padding: 4px 9px; border-radius: 5px;
      border: 1px solid #e0dfd8; background: transparent;
      color: #1a1a1a; cursor: pointer; margin-right: 3px;
    }
    .action-btn:hover { background: #f3f3f0; }
    .launch-btn {
      font-size: 15px; padding: 3px 8px; border-radius: 5px;
      border: 1px solid #3B6D11; background: transparent;
      color: #3B6D11; cursor: pointer; line-height: 1; transition: background 0.15s;
    }
    .launch-btn:hover { background: #dcfce7; }
    .launch-btn.done { background: #dcfce7; color: #14532d; border-color: #14532d; cursor: default; }

    .mgr-notes-input, .agent-notes-input {
      width: 100%; font-size: 12px; padding: 5px 8px;
      border: 1px solid #e0dfd8; border-radius: 5px;
      resize: none; min-height: 38px;
      color: #1a1a1a; background: #fff;
      font-family: inherit; line-height: 1.4; transition: border-color 0.15s;
    }
    .mgr-notes-input:focus, .agent-notes-input:focus { outline: none; border-color: #a4c0fb; }
    .mgr-notes-input::placeholder, .agent-notes-input::placeholder { color: #aaa; }

    .called-cb    { width: 18px; height: 18px; cursor: pointer; accent-color: #16a34a; }
    .called-label { font-size: 10px; color: #888; }
    .called-yes   { font-size: 11px; font-weight: 600; color: #16a34a; }

    .launched-section { margin-top: 1rem; }
    .launched-toggle {
      font-size: 12px; color: #888; cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      margin-bottom: 0.75rem; background: none; border: none; padding: 0;
    }
    .launched-toggle:hover { color: #1a1a1a; }

    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      display: flex; align-items: flex-start; justify-content: center;
      padding: 2rem 1rem; z-index: 100; overflow-y: auto;
    }
    .modal {
      background: #fff; border-radius: 10px; border: 1px solid #e0dfd8;
      padding: 1.5rem; width: 100%; max-width: 640px; margin-top: 1rem;
    }
    .modal h2 { font-size: 16px; font-weight: 600; margin-bottom: 1.25rem; color: #1a1a1a; }
    .field { margin-bottom: 1rem; }
    .field label { display: block; font-size: 12px; color: #666; margin-bottom: 5px; font-weight: 500; }
    .field input, .field select, .field textarea {
      width: 100%; font-size: 13px; padding: 7px 10px;
      border: 1px solid #d0cfc8; border-radius: 6px; color: #1a1a1a; background: #fff; outline: none;

    .field input:focus, .field select:focus, .field textarea:focus { border-color: #a4c0fb; }
    .field textarea { min-height: 72px; resize: vertical; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 1.25rem; flex-wrap: wrap; }
    .btn-primary {
      font-size: 13px; padding: 7px 16px; border-radius: 6px;
      border: 1px solid #a4c0fb; background: #e8f0fe; color: #1a56db; cursor: pointer; font-weight: 500;

    .btn-primary:hover { opacity: 0.85; }
    .btn-cancel {

    .copied { font-size: 12px; color: #16a34a; margin-left: 6px; opacity: 0; transition: opacity 0.3s; }

    .email-meta { background: #f5f5f2; padding: 0.75rem 1rem; border-bottom: 1px solid #d0cfc8; }

    .urgency-warn { color:#92400e; font-weight:600; font-size:13px; margin-bottom:10px; padding:8px 10px; background:#fffbeb; border-left:3px solid #d97706; border-radius:2px; font-family:Arial,sans-serif; }
    .email-acct-table { width:100%; border-collapse:collapse; margin:12px 0; font-size:12px; font-family:Arial,sans-serif; }

    .email-acct-table td { padding:7px 12px; border:1px solid #d1d0c8; vertical-align:top; line-height:1.4; color:#1a1a1a; background:#fff; }
    .email-acct-table tr:nth-child(even) td { background:#f5f5f2; }
    .reason-pill { display:inline-block; font-size:11px; padding:2px 8px; border-radius:3px; font-weight:600; border:1px solid transparent; }
    .rp-domain{background:#dbeafe;color:#1e40af;border-color:#93c5fd}
    .rp-edits{background:#ede9fe;color:#4c1d95;border-color:#c4b5fd}
    .rp-unresponsive{background:#fef3c7;color:#78350f;border-color:#fcd34d}
    .rp-launching{background:#dcfce7;color:#14532d;border-color:#86efac}

    .date-overdue{color:#b91c1c;font-weight:700}
    .date-soon{color:#b45309;font-weight:600}
    .date-ok{color:#1a1a1a}

</head>

  /* ── Helpers ── */
  function sortKey(d) { return d ? d : '2099-12-31'; }

  function fmtDate(s) {
    if (!s) return '';
    const [y,m,d] = s.split('-');
    return `${m}/${d}/${y}`;
  }

  function getTodayStr() { return fmtDate(TODAY_ISO); }

  function dateStatus(due) {
    if (!due) return { cls:'', tag:'', emailCls:'date-ok' };
    const diff = Math.ceil((new Date(due) - TODAY) / (1000*60*60*24));
    if (diff < 0)   return { cls:'overdue', tag:' ⚠',  emailCls:'date-overdue' };
    if (diff === 0) return { cls:'soon',    tag:' 📅', emailCls:'date-soon'    };
    if (diff <= 7)  return { cls:'soon',    tag:'',    emailCls:'date-soon'    };
    return { cls:'', tag:'', emailCls:'date-ok' };
  }

  function initials(n) { return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2); }

  function sorted(arr) {
    return [...arr].sort((a,b) =>
      sortKey(a.due) < sortKey(b.due) ? -1 :
      sortKey(a.due) > sortKey(b.due) ?  1 : 0
    );
  }

  /* ── Inline field savers ── */
  function saveReason(id, val)     { const a=accounts.find(x=>x.id===id); if(a) a.reason=val; }
  function saveDue(id, val)        { const a=accounts.find(x=>x.id===id); if(a){ a.due=val; renderMetrics(); } }
  function saveMgrNotes(id, val)   { const a=accounts.find(x=>x.id===id); if(a) a.mgrNotes=val; }
  function saveAgentNotes(id, val) { const a=accounts.find(x=>x.id===id); if(a) a.agentNotes=val; }
  function toggleCalled(id)        { const a=accounts.find(x=>x.id===id); if(a){ a.called=!a.called; render(); } }
  function toggleLaunch(id)        { const a=accounts.find(x=>x.id===id); if(!a||a.launched) return; a.launched=true; a.launchedDate=TODAY_ISO; render(); }
  function toggleShowLaunched()    { showLaunched=!showLaunched; render(); }
  function setFilter(f, el)        { currentFilter=f; document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render(); }

  /* ── Get reps ── */
  function getReps() {
    const active = accounts.filter(a =>
      !a.launched && (currentFilter==='all' || a.reason===currentFilter)
    );
    const map = {};
    active.forEach(a => {
      if (!map[a.rep]) map[a.rep] = { rep: a.rep, accounts: [] };
      map[a.rep].accounts.push(a);
    });
    Object.values(map).forEach(r => { r.accounts = sorted(r.accounts); });
    return REP_ORDER.filter(r => map[r]).map(r => map[r]);
  }

  /* ── Row renderer ── */
  function renderRow(a) {
    const ds = dateStatus(a.due);

    const launchBtn = a.launched
      ? `<button class="launch-btn done" disabled title="Launched">✓</button>`
      : `<button class="launch-btn" onclick="toggleLaunch(${a.id})" title="Mark as launched">✓</button>`;

    const reasonCell = a.launched
      ? `<span class="badge badge-launched">Launched</span>`
      : `<select class="inline-select" onchange="saveReason(${a.id},this.value)">
          ${REASONS.map(r=>`<option value="${r}"${r===a.reason?' selected':''}>${r}</option>`).join('')}
         </select>`;

    const dueCell = a.launched
      ? `<span style="color:#16a34a">${fmtDate(a.launchedDate)}</span>`
      : `<input type="date" class="inline-date" value="${a.due}"
            onchange="saveDue(${a.id},this.value)"
            title="${a.due ? fmtDate(a.due) : 'Set due date'}" />
         ${a.due ? `<span class="${ds.cls}" style="font-size:11px;display:block;margin-top:2px">${fmtDate(a.due)}${ds.tag}</span>` : ''}`;

    const mgrCell = a.launched
      ? `<span style="font-size:12px;color:#888">${a.mgrNotes||'—'}</span>`
      : `<textarea class="mgr-notes-input" placeholder="Manager notes…"
            onchange="saveMgrNotes(${a.id},this.value)"
            onblur="saveMgrNotes(${a.id},this.value)">${a.mgrNotes}</textarea>`;

    const agentCell = a.launched
      ? `<span style="font-size:12px;color:#888">${a.agentNotes||'—'}</span>`
      : `<textarea class="agent-notes-input" placeholder="Agent notes…"
            onchange="saveAgentNotes(${a.id},this.value)"
            onblur="saveAgentNotes(${a.id},this.value)">${a.agentNotes}</textarea>`;

    const calledCell = a.launched ? '' : `
      <div class="called-wrap">
        <input type="checkbox" class="called-cb"
          ${a.called?'checked':''} onchange="toggleCalled(${a.id})" />
        <span class="${a.called?'called-yes':'called-label'}">${a.called?'✓ Called':'Called?'}</span>
      </div>`;

    return `<tr class="${a.launched?'launched':''}">
      <td class="col-launch">${launchBtn}</td>
      <td class="col-account" style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${a.account}">${a.account}</td>
      <td class="col-reason">${reasonCell}</td>
      <td class="col-due">${dueCell}</td>
      <td class="col-mgr">${mgrCell}</td>
      <td class="col-agent">${agentCell}</td>
      <td class="col-called" style="text-align:center">${calledCell}</td>
      <td class="col-actions">
        <button class="action-btn" onclick="del(${a.id})" title="Remove">🗑</button>
      </td>
    </tr>`;
  }

  /* ── Main render ── */
  function render() {
    renderMetrics();
    const reps     = getReps();
    const launched = sorted(accounts.filter(a => a.launched));
    const container = document.getElementById('rep-sections');
    let html = '';

    if (reps.length===0 && launched.length===0) {
      html = `<div class="empty-state">No accounts for this filter.</div>`;
    } else {
      html += reps.map(r => `
        <div class="rep-section">
          <div class="rep-header">
            <div class="rep-info">
              <div class="avatar">${initials(r.rep)}</div>
              <div>
                <div class="rep-name">${r.rep}</div>
                <div class="rep-count">${r.accounts.length} account${r.accounts.length!==1?'s':''}</div>
              </div>
            </div>
            <button class="email-rep-btn" onclick="openRepEmail('${encodeURIComponent(r.rep)}')">
              ✉ Draft digest email
            </button>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th class="col-launch"></th>
                <th class="col-account">Account</th>
                <th class="col-reason">Stall reason</th>
                <th class="col-due">Due date ▲</th>
                <th class="col-mgr">Manager Notes</th>
                <th class="col-agent">Agent Notes</th>
                <th class="col-called" style="text-align:center">Called?</th>
                <th class="col-actions">Actions</th>
              </tr></thead>
              <tbody>${r.accounts.map(renderRow).join('')}</tbody>
            </table>
          </div>
        </div>`).join('');

      if (launched.length > 0) {
        html += `
          <div class="launched-section">
            <button class="launched-toggle" onclick="toggleShowLaunched()">
              ${showLaunched?'▼':'▶'} Launched accounts (${launched.length})
            </button>
            ${showLaunched ? `
              <div class="table-wrap"><table>
                <thead><tr>
                  <th class="col-launch"></th>
                  <th class="col-account">Account</th>
                  <th class="col-reason">Status</th>
                  <th class="col-due">Launched</th>
                  <th class="col-mgr">Manager Notes</th>
                  <th class="col-agent">Agent Notes</th>
                  <th class="col-called"></th>
                  <th class="col-actions">Actions</th>
                </tr></thead>
                <tbody>${launched.map(renderRow).join('')}</tbody>
              </table></div>` : ''}
          </div>`;
      }
    }
    container.innerHTML = html;
  }

  /* ── Metrics ── */
  function renderMetrics() {
    const active       = accounts.filter(a => !a.launched);
    const launchedCnt  = accounts.filter(a =>  a.launched).length;
    const overdue      = active.filter(a => dateStatus(a.due).cls==='overdue').length;
    const domain       = active.filter(a => a.reason==='Domain').length;
    const edits        = active.filter(a => a.reason==='Edits').length;
    const unresponsive = active.filter(a => a.reason==='Unresponsive').length;
    const lt           = active.filter(a => a.reason==='Launching Today').length;
    const other        = active.filter(a => a.reason==='Other'||a.reason==='Approval Needed').length;
    const called       = active.filter(a => a.called).length;

    document.getElementById('metrics').innerHTML = `
      <div class="metric"><div class="metric-label">Active stalls</div><div class="metric-val">${active.length}</div></div>
      <div class="metric"><div class="metric-label">Overdue</div><div class="metric-val" style="color:#b91c1c">${overdue}</div></div>
      <div class="metric"><div class="metric-label">Domain issues</div><div class="metric-val">${domain}</div></div>
      <div class="metric"><div class="metric-label">Edits pending</div><div class="metric-val">${edits}</div></div>
      <div class="metric"><div class="metric-label">Unresponsive</div><div class="metric-val">${unresponsive}</div></div>
      <div class="metric"><div class="metric-label">Launching today</div><div class="metric-val" style="color:#16a34a">${lt}</div></div>
      <div class="metric"><div class="metric-label">Other</div><div class="metric-val">${other}</div></div>
      <div class="metric"><div class="metric-label">Called today</div><div class="metric-val" style="color:#16a34a">${called}</div></div>
      <div class="metric"><div class="metric-label">Launched</div><div class="metric-val" style="color:#16a34a">${launchedCnt}</div></div>`;
  }

  /* ── Email ── */
  function buildEmailRows(accts) {
    return sorted(accts).map(a => {
      const ds   = dateStatus(a.due);
      const diff = a.due ? Math.ceil((new Date(a.due)-TODAY)/(1000*60*60*24)) : null;
      const flag = ds.cls==='overdue' ? ' ⚠ OVERDUE'
                 : diff===0           ? ' (today)'
                 : ds.cls==='soon'    ? ' (soon)' : '';
      const calledTag = a.called
        ? ` <span style="font-size:10px;color:#16a34a;font-weight:600">(Called ✓)</span>` : '';
      return `<tr>
        <td style="font-weight:600;padding:7px 12px;border:1px solid #d1d0c8;white-space:nowrap">${a.account}${calledTag}</td>
        <td style="padding:7px 12px;border:1px solid #d1d0c8;white-space:nowrap">
          <span class="reason-pill ${REASON_PILL[a.reason]||'rp-other'}">${a.reason}</span>
        </td>
        <td class="${ds.emailCls}" style="padding:7px 12px;border:1px solid #d1d0c8;white-space:nowrap">
          ${a.due ? fmtDate(a.due)+flag : 'TBD'}
        </td>
        <td style="padding:7px 12px;border:1px solid #d1d0c8">${a.mgrNotes||'—'}</td>
        <td style="padding:7px 12px;border:1px solid #d1d0c8;color:#555;font-style:italic">${a.agentNotes||'—'}</td>
      </tr>`;
    }).join('');
  }

          <th style="background:#fff;color:#1a1a1a;font-weight:700;padding:8px 12px;border:1.5px solid #c0bfb8;text-align:left">Account</th>
          <th style="background:#fff;color:#1a1a1a;font-weight:700;padding:8px 12px;border:1.5px solid #c0bfb8;text-align:left">Stall reason</th>
          <th style="background:#fff;color:#1a1a1a;font-weight:700;padding:8px 12px;border:1.5px solid #c0bfb8;text-align:left">Due date ▲</th>
          <th style="background:#fff;color:#1a1a1a;font-weight:700;padding:8px 12px;border:1.5px solid #c0bfb8;text-align:left">Manager notes</th>
          <th style="background:#fff;color:#1a1a1a;font-weight:700;padding:8px 12px;border:1.5px solid #c0bfb8;text-align:left">Agent notes</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <p>For each account: reach out to the client directly, log updates in the agent notes field, and flag anything blocking you so we can help.</p>
      <p>Thank you for staying on top of these!</p>
    </div>`;

    const htmlBlob  = new Blob([html], { type:'text/html' });
    const plainBlob = new Blob([document.getElementById('em-body').innerText], { type:'text/plain' });
    if (window.ClipboardItem) {
      navigator.clipboard.write([new ClipboardItem({'text/html':htmlBlob,'text/plain':plainBlob})])
        .then(()=>flash('cp-html'))
        .catch(()=>navigator.clipboard.writeText(document.getElementById('em-body').innerText).then(()=>flash('cp-html')));
    } else {
      navigator.clipboard.writeText(document.getElementById('em-body').innerText).then(()=>flash('cp-html'));
    }
  }

  function flash(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'), 2000);
  }

  function openMailto() {
    const to   = document.getElementById('em-to').value;
    const sub  = encodeURIComponent(document.getElementById('em-sub').value);
    const body = encodeURIComponent(document.getElementById('em-body').innerText);
    window.location.href = `mailto:${to}?subject=${sub}&body=${body}`;
  }

  /* ── Add / Delete ── */
  function openAdd() {
    document.getElementById('modal-root').innerHTML = `
      <div class="modal-bg" onclick="closeMBg(event)">
        <div class="modal" onclick="event.stopPropagation()">
          <h2>Add stalled account</h2>
          <div class="field"><label>Account name</label><input id="f-account" placeholder="e.g. Acme Corp" /></div>
          <div class="field">
            <label>Rep</label>
            <select id="f-rep">${REP_ORDER.map(r=>`<option>${r}</option>`).join('')}</select>
          </div>
          <div class="field">
            <label>Stall reason</label>
            <select id="f-reason">${REASONS.map(r=>`<option>${r}</option>`).join('')}</select>
          </div>
          <div class="field"><label>Due date</label><input id="f-due" type="date" /></div>
          <div class="field"><label>Manager notes</label><textarea id="f-notes" placeholder="Notes for this account…"></textarea></div>
          <div class="modal-actions">
            <button class="btn-cancel" onclick="closeMEl()">Cancel</button>
            <button class="btn-primary" onclick="saveAdd()">Add account</button>
          </div>
        </div>
      </div>`;
  }

  function saveAdd() {
    const account = document.getElementById('f-account').value.trim();
    if (!account) { alert('Account name is required.'); return; }
    accounts.push({
      id: nextId++,
      account,
      rep:      document.getElementById('f-rep').value,
      reason:   document.getElementById('f-reason').value,
      due:      document.getElementById('f-due').value || '',
      mgrNotes: document.getElementById('f-notes').value.trim(),
      agentNotes: '', called: false, launched: false
    });
    closeMEl(); render();
  }

  function del(id) {
    if (!confirm('Remove this account from the stalled list?')) return;
    accounts = accounts.filter(x => x.id !== id);
    render();
  }

  function closeMBg(e) { if (e.target.classList.contains('modal-bg')) closeMEl(); }
  function closeMEl()  { document.getElementById('modal-root').innerHTML = ''; }

  /* ── Init ── */
  render();
</script>
</body>
</html>
